<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DooM — AUPSCAEPM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #d4d4d8;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 1rem 2vw 2rem;
  }

  /* Scanline */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  a.back-link {
    display: inline-block;
    margin-bottom: 1.2rem;
    font-size: 0.75rem;
    color: #6b6b7b;
    text-decoration: none;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid #1a1a2e;
    padding: 0.4rem 0.8rem;
    transition: color 0.3s, border-color 0.3s;
  }
  a.back-link:hover { color: #c9a227; border-color: #8a6e15; }

  h1 {
    font-size: 1.8rem;
    color: #c9a227;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    text-shadow: 0 0 30px rgba(201,162,39,0.15);
  }

  .info {
    font-size: 0.8rem;
    color: #6b6b7b;
    line-height: 1.6;
    margin-bottom: 1rem;
    max-width: 700px;
  }
  .info button {
    display: inline;
    background: #1a1a2e;
    color: #c9a227;
    border: 1px solid #8a6e15;
    border-radius: 4px;
    padding: 0.1em 0.4em;
    font-family: inherit;
    font-size: 0.75rem;
    cursor: default;
  }

  #focushint {
    font-size: 0.85rem;
    color: #c9a227;
    min-height: 1.2em;
    margin-bottom: 0.5rem;
  }

  .grey-hint {
    font-size: 0.7rem;
    color: #6b6b7b;
    margin-bottom: 0.8rem;
  }

  /* ── Game container ── */
  .container {
    display: flex;
  }

  .big-holder {
    position: relative;
    width: 68vw;
    height: 41vw;
    border: 1px solid #1a1a2e;
    background: #000;
  }

  #screen {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0.01;
  }

  #gradientScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    pointer-events: none;
    background-size: 200% 200%;
  }

  @media (max-width: 1024px) {
    .big-holder {
      width: 94vw;
      height: calc(94vw * 10 / 16);
    }
  }

  /* ── Mobile controls ── */
  h3.controls-title {
    font-size: 0.7rem;
    color: #8a6e15;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1vw;
    user-select: none;
  }

  .left-controls {
    display: flex;
    gap: 1vw;
    flex-wrap: wrap;
  }

  .arrow-controls {
    display: flex;
    flex-direction: column;
    gap: 1vw;
  }

  .arrow-row {
    display: flex;
    justify-content: center;
    gap: 1vw;
  }

  .arrow-spacer {
    display: inline-block;
    min-width: 10vw;
    min-height: 10vw;
  }

  .controls button {
    min-width: 10vw;
    min-height: 10vw;
    font-weight: bold;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    border: none;
    border-radius: 3vw;
    color: #fff;
    background-color: #550000;
    box-shadow: 0 0 5px #000;
    transition: background-color 0.2s ease;
    cursor: pointer;
  }

  .controls button:hover { background-color: #aa0000; }
  .controls button:active { background-color: #770000; }

  /* Desktop : cacher les contrôles mobile */
  @media (pointer: fine) {
    h3.controls-title, .controls { display: none; }
  }
</style>
</head>
<body>

<a href="../index.html" class="back-link">← Retour à l'accueil</a>

<h1>DooM</h1>

<p id="focushint"></p>

<p class="info">
  <button tabindex="-1" aria-label="enter" role="presentation">⏎</button> démarrer &nbsp;
  <button tabindex="-1" aria-label="arrows" role="presentation">← ↑ ↓ →</button> se déplacer &nbsp;
  <button tabindex="-1" aria-label="ctrl" role="presentation">ctrl</button> tirer &nbsp;
  <button tabindex="-1" aria-label="space" role="presentation">espace</button> ouvrir &nbsp;
  <button tabindex="-1" aria-label="alt" role="presentation">alt</button>+flèches strafe
</p>

<p class="grey-hint">Si vous voyez des lignes grises, ajustez la largeur de la fenêtre.</p>

<div class="container">
  <div class="big-holder">
    <div id="gradientScreen"></div>
    <canvas id="screen" tabindex="0">DooM screen</canvas>
  </div>
</div>

<h3 class="controls-title">Contrôles tactiles</h3>
<div class="controls">
  <div class="left-controls">
    <button id="enterButton" aria-label="Enter">⏎</button>
    <button id="ctrlButton">Ctrl</button>
    <button id="spaceButton">Space</button>
    <button id="altButton">Alt</button>
  </div>
  <div class="arrow-controls">
    <div class="arrow-row top">
      <span class="arrow-spacer"></span>
      <button id="upButton" aria-label="up">↑</button>
      <span class="arrow-spacer"></span>
    </div>
    <div class="arrow-row bottom">
      <button id="leftButton" aria-label="left">←</button>
      <button id="downButton" aria-label="down">↓</button>
      <button id="rightButton" aria-label="right">→</button>
    </div>
  </div>
</div>

<script>
"use strict";
var memory = new WebAssembly.Memory({ initial: 108 });

function readWasmString(offset, length) {
  var bytes = new Uint8Array(memory.buffer, offset, length);
  return new TextDecoder("utf8").decode(bytes);
}

function consoleLogString(offset, length) {
  console.log('"' + readWasmString(offset, length) + '"');
}

function appendOutput(style) {
  return function (offset, length) {};
}

function getMilliseconds() {
  return performance.now();
}

var canvas = document.getElementById("screen");
var doom_screen_width = 320 * 2;
var doom_screen_height = 200 * 2;

function rgbaToHex(r, g, b) {
  return "#" + [r, g, b].map(function(x) {
    return Math.round(x).toString(16).padStart(2, "0");
  }).join("");
}

function averageBlockColour(data, startX, startY, width, blockSize) {
  var r = 0, g = 0, b = 0;
  for (var y = startY; y < startY + blockSize; y++) {
    for (var x = startX; x < startX + blockSize; x++) {
      var i = (y * width + x) * 4;
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
    }
  }
  var size = blockSize * blockSize;
  return rgbaToHex(r / size, g / size, b / size);
}

function drawCanvas(ptr) {
  var doom_screen = new Uint8ClampedArray(
    memory.buffer, ptr,
    doom_screen_width * doom_screen_height * 4
  );

  var gradientDiv = document.getElementById("gradientScreen");
  var blockSize = 2;
  var scaledWidth = doom_screen_width / blockSize;
  var scaledHeight = doom_screen_height / blockSize;

  var layers = [];
  var positions = [];
  var sizes = [];
  var vwu = 100 / scaledWidth;
  var vhu = 100 / scaledHeight;

  for (var y = 0; y < doom_screen_height; y += blockSize) {
    var stops = [];
    var prevColor = null;
    var segmentStart = 0;

    for (var x = 0; x < doom_screen_width; x += blockSize) {
      var avgColor = averageBlockColour(doom_screen, x, y, doom_screen_width, blockSize);
      if (prevColor === null) {
        prevColor = avgColor;
        segmentStart = x / blockSize;
      } else if (avgColor !== prevColor) {
        stops.push(prevColor + " " + (segmentStart * vwu) + "%, " + prevColor + " " + ((x * vwu) / blockSize) + "%");
        segmentStart = x / blockSize;
        prevColor = avgColor;
      }
    }
    stops.push(prevColor + " " + (segmentStart * vwu) + "%, " + prevColor + " " + (scaledWidth * vwu) + "%");

    layers.push("linear-gradient(to right, " + stops.join(", ") + ")");
    positions.push("0px " + ((y * vhu) / blockSize) + "%");
    sizes.push((scaledWidth * vwu) + "% " + (vhu * 1.1) + "%");
  }

  gradientDiv.style.backgroundImage = layers.join(", ");
  gradientDiv.style.backgroundPosition = positions.join(", ");
  gradientDiv.style.backgroundSize = sizes.join(", ");
  gradientDiv.style.backgroundRepeat = "no-repeat";
}

var importObject = {
  js: {
    js_console_log: appendOutput("log"),
    js_stdout: appendOutput("stdout"),
    js_stderr: appendOutput("stderr"),
    js_milliseconds_since_start: getMilliseconds,
    js_draw_screen: drawCanvas,
  },
  env: { memory: memory }
};

document.addEventListener("contextmenu", function(e) { e.preventDefault(); });

WebAssembly.instantiateStreaming(fetch("doom.wasm"), importObject).then(function(obj) {
  obj.instance.exports.main();

  var doomKeyCode = function(keyCode) {
    switch (keyCode) {
      case 8:  return 127;
      case 17: return 0x80 + 0x1d;
      case 18: return 0x80 + 0x38;
      case 37: return 0xac;
      case 38: return 0xad;
      case 39: return 0xae;
      case 40: return 0xaf;
      default:
        if (keyCode >= 65 && keyCode <= 90) return keyCode + 32;
        if (keyCode >= 112 && keyCode <= 123) return keyCode + 75;
        return keyCode;
    }
  };

  var keyDown = function(keyCode) { obj.instance.exports.add_browser_event(0, keyCode); };
  var keyUp = function(keyCode) { obj.instance.exports.add_browser_event(1, keyCode); };

  canvas.addEventListener("keydown", function(event) {
    keyDown(doomKeyCode(event.keyCode));
    event.preventDefault();
  }, false);

  canvas.addEventListener("keyup", function(event) {
    keyUp(doomKeyCode(event.keyCode));
    event.preventDefault();
  }, false);

  // Mobile touch
  [
    ["enterButton", 13],
    ["leftButton", 0xac],
    ["rightButton", 0xae],
    ["upButton", 0xad],
    ["downButton", 0xaf],
    ["ctrlButton", 0x80 + 0x1d],
    ["spaceButton", 32],
    ["altButton", 0x80 + 0x38]
  ].forEach(function(pair) {
    var button = document.getElementById(pair[0]);
    button.addEventListener("touchstart", function() { keyDown(pair[1]); });
    button.addEventListener("touchend", function() { keyUp(pair[1]); });
    button.addEventListener("touchcancel", function() { keyUp(pair[1]); });
  });

  // Focus hints
  var focushint = document.getElementById("focushint");
  canvas.addEventListener("focusin", function() {
    focushint.innerText = "Doom actif — si l'input ne répond plus, recliquez sur le jeu";
    focushint.style.fontWeight = "normal";
  }, false);

  canvas.addEventListener("focusout", function() {
    focushint.innerText = "Cliquez sur le jeu pour capturer les touches.";
    focushint.style.fontWeight = "bold";
  }, false);

  canvas.focus();
  focushint.innerText = "Doom actif — si l'input ne répond plus, recliquez sur le jeu";

  // Game loop
  function step(timestamp) {
    obj.instance.exports.doom_loop_step();
    window.requestAnimationFrame(step);
  }
  window.requestAnimationFrame(step);

}).catch(function(err) {
  console.error("Erreur chargement WebAssembly:", err);
  document.getElementById("focushint").innerText = "Erreur : impossible de charger doom.wasm";
  document.getElementById("focushint").style.color = "#aa0000";
});
</script>

</body>
</html>
