<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casse-Briques</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #05000d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #e040fb;
    overflow: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      transparent, transparent 2px,
      rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .cabinet {
    background: #0c0614;
    border: 3px solid #e040fb;
    border-radius: 12px;
    padding: 20px;
    box-shadow:
      0 0 30px rgba(224, 64, 251, 0.12),
      inset 0 0 50px rgba(0,0,0,0.6);
    position: relative;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 10px;
  }

  .score { text-shadow: 0 0 8px rgba(224,64,251,0.6); }
  .lives { color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.4); }
  .level { color: #ffea00; text-shadow: 0 0 8px rgba(255,234,0,0.4); font-size: 8px; }

  canvas {
    display: block;
    background: #08020f;
    border: 2px solid #1a0a2a;
    image-rendering: pixelated;
  }

  .controls {
    margin-top: 10px;
    text-align: center;
    font-size: 7px;
    color: #3a1a4a;
    letter-spacing: 1px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5,0,13,0.92);
    border-radius: 12px;
    z-index: 10;
    gap: 18px;
  }

  .overlay.hidden { display: none; }

  .overlay h1 {
    font-size: 17px;
    text-shadow: 0 0 20px rgba(224,64,251,0.8);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .overlay .sub {
    font-size: 9px;
    color: #7a2a9a;
    animation: blink 1s step-end infinite;
  }

  .overlay .final {
    font-size: 11px;
    color: #ffea00;
    text-shadow: 0 0 10px rgba(255,234,0,0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .mobile-controls {
    display: none;
    margin-top: 14px;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }

  .mobile-controls button {
    width: 70px;
    height: 56px;
    background: #0c0614;
    border: 2px solid #e040fb;
    color: #e040fb;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .mobile-controls button:active { background: #e040fb; color: #05000d; }

  @media (pointer: coarse) {
    .mobile-controls { display: flex; }
    .controls { display: none; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="hud">
    <span class="score" id="score">SCORE: 0</span>
    <span class="level" id="level">NIVEAU 1</span>
    <span class="lives" id="lives">♥♥♥</span>
  </div>
  <canvas id="game" width="420" height="520"></canvas>
  <div class="controls">◄ ► DÉPLACER &nbsp; ESPACE LANCER</div>
  <div class="mobile-controls">
    <button ontouchstart="mLeft=true" ontouchend="mLeft=false">◄</button>
    <button ontouchstart="mRight=true" ontouchend="mRight=false">►</button>
  </div>

  <div class="overlay" id="startScreen">
    <h1>🧱 CASSE-BRIQUES</h1>
    <p class="sub">APPUYEZ POUR JOUER</p>
  </div>

  <div class="overlay hidden" id="deathScreen">
    <h1>GAME OVER</h1>
    <p class="final" id="finalScore"></p>
    <p class="sub">APPUYEZ POUR REJOUER</p>
  </div>

  <div class="overlay hidden" id="winScreen">
    <h1>NIVEAU TERMINÉ !</h1>
    <p class="final" id="winScore"></p>
    <p class="sub">APPUYEZ POUR CONTINUER</p>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let state = 'start';
let score, lives, levelNum;
let paddle, ball, bricks, particles;
let keys = {}, mLeft = false, mRight = false;
let lastTime = 0;
let attached = true; // ball stuck to paddle before launch

const BRICK_ROWS = 7;
const BRICK_COLS = 10;
const BRICK_W = 36;
const BRICK_H = 14;
const BRICK_PAD = 3;
const BRICK_TOP = 50;
const BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

const ROW_COLORS = [
  '#ff1744', '#ff9100', '#ffea00', '#76ff03', '#00e5ff', '#2979ff', '#e040fb'
];
const ROW_GLOWS = [
  'rgba(255,23,68,0.5)', 'rgba(255,145,0,0.5)', 'rgba(255,234,0,0.5)',
  'rgba(118,255,3,0.5)', 'rgba(0,229,255,0.5)', 'rgba(41,121,255,0.5)', 'rgba(224,64,251,0.5)'
];

function spawnBricks(level) {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      let hp = 1;
      // Higher levels: some bricks take 2 or 3 hits
      if (level >= 2 && r < 2) hp = 2;
      if (level >= 3 && r === 0) hp = 3;
      bricks.push({
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        color: ROW_COLORS[r],
        glow: ROW_GLOWS[r],
        hp,
        maxHp: hp,
        alive: true
      });
    }
  }
}

function init(level) {
  levelNum = level || 1;
  if (!level || level === 1) { score = 0; lives = 3; }
  paddle = { x: W / 2, y: H - 30, w: 70, h: 12 };
  const speed = 3.5 + levelNum * 0.3;
  ball = { x: paddle.x, y: paddle.y - 8, r: 6, vx: speed * 0.7, vy: -speed };
  attached = true;
  particles = [];
  spawnBricks(levelNum);
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = 'SCORE: ' + score;
  document.getElementById('lives').textContent = '♥'.repeat(Math.max(0, lives));
  document.getElementById('level').textContent = 'NIVEAU ' + levelNum;
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++)
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 1, color,
      size: Math.random() * 3 + 1
    });
}

function launch() {
  if (attached) {
    attached = false;
    const speed = 3.5 + levelNum * 0.3;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
  }
}

function update(dt) {
  if (state !== 'play') return;

  // Paddle movement
  const pSpeed = 5.5;
  if (keys['ArrowLeft'] || keys['q'] || keys['Q'] || mLeft) paddle.x -= pSpeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || mRight) paddle.x += pSpeed;
  paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));

  // Attached ball follows paddle
  if (attached) {
    ball.x = paddle.x;
    ball.y = paddle.y - ball.r - paddle.h / 2;
    // Particles
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
    particles = particles.filter(p => p.life > 0);
    return;
  }

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Bottom — lose life
  if (ball.y + ball.r >= H) {
    lives--;
    addParticles(ball.x, ball.y, '#e040fb', 15);
    updateHUD();
    if (lives <= 0) { die(); return; }
    // Reset ball
    attached = true;
    ball.x = paddle.x;
    ball.y = paddle.y - ball.r - paddle.h / 2;
    ball.vx = 0;
    ball.vy = 0;
    return;
  }

  // Paddle collision
  const px1 = paddle.x - paddle.w / 2;
  const px2 = paddle.x + paddle.w / 2;
  const py1 = paddle.y - paddle.h / 2;
  const py2 = paddle.y + paddle.h / 2;
  if (ball.vy > 0 && ball.y + ball.r >= py1 && ball.y - ball.r <= py2 &&
      ball.x >= px1 && ball.x <= px2) {
    // Angle based on where the ball hit the paddle
    const hit = (ball.x - paddle.x) / (paddle.w / 2); // -1 to 1
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    const angle = -Math.PI / 2 + hit * (Math.PI / 3); // ±60°
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
    ball.y = py1 - ball.r;
    addParticles(ball.x, paddle.y, '#00e5ff', 5);
  }

  // Brick collisions
  bricks.forEach(brick => {
    if (!brick.alive) return;
    const bx1 = brick.x, bx2 = brick.x + brick.w;
    const by1 = brick.y, by2 = brick.y + brick.h;

    // Check if ball overlaps brick
    const closestX = Math.max(bx1, Math.min(ball.x, bx2));
    const closestY = Math.max(by1, Math.min(ball.y, by2));
    const dx = ball.x - closestX;
    const dy = ball.y - closestY;

    if (dx * dx + dy * dy <= ball.r * ball.r) {
      brick.hp--;
      if (brick.hp <= 0) {
        brick.alive = false;
        score += (BRICK_ROWS - Math.floor((brick.y - BRICK_TOP) / (BRICK_H + BRICK_PAD)) ) * 10;
        addParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 10);
      } else {
        addParticles(closestX, closestY, brick.color, 4);
      }
      updateHUD();

      // Reflect ball
      const overlapX = ball.r - Math.abs(dx);
      const overlapY = ball.r - Math.abs(dy);
      if (overlapX < overlapY) {
        ball.vx = -ball.vx;
        ball.x += (ball.vx > 0 ? 1 : -1) * overlapX;
      } else {
        ball.vy = -ball.vy;
        ball.y += (ball.vy > 0 ? 1 : -1) * overlapY;
      }
    }
  });

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
  particles = particles.filter(p => p.life > 0);

  // Win check
  if (bricks.every(b => !b.alive)) {
    state = 'win';
    document.getElementById('winScore').textContent = 'SCORE: ' + score;
    document.getElementById('winScreen').classList.remove('hidden');
  }
}

function drawScene() {
  ctx.fillStyle = '#08020f';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(224,64,251,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 20) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 20) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Bricks
  bricks.forEach(brick => {
    if (!brick.alive) return;
    const alpha = brick.hp / brick.maxHp;
    ctx.fillStyle = brick.color;
    ctx.globalAlpha = 0.4 + 0.6 * alpha;
    ctx.shadowColor = brick.glow;
    ctx.shadowBlur = 8;

    // Rounded rect
    const r = 3;
    const {x, y, w, h} = brick;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();

    // Crack effect for damaged bricks
    if (brick.hp < brick.maxHp) {
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.3, y);
      ctx.lineTo(x + w * 0.5, y + h * 0.5);
      ctx.lineTo(x + w * 0.7, y + h);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });

  // Paddle
  const grd = ctx.createLinearGradient(paddle.x - paddle.w/2, 0, paddle.x + paddle.w/2, 0);
  grd.addColorStop(0, '#00b8d4');
  grd.addColorStop(0.5, '#00e5ff');
  grd.addColorStop(1, '#00b8d4');
  ctx.fillStyle = grd;
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 10;
  const pr = 4;
  const px = paddle.x - paddle.w/2, py = paddle.y - paddle.h/2;
  ctx.beginPath();
  ctx.moveTo(px + pr, py);
  ctx.lineTo(px + paddle.w - pr, py);
  ctx.quadraticCurveTo(px + paddle.w, py, px + paddle.w, py + pr);
  ctx.lineTo(px + paddle.w, py + paddle.h - pr);
  ctx.quadraticCurveTo(px + paddle.w, py + paddle.h, px + paddle.w - pr, py + paddle.h);
  ctx.lineTo(px + pr, py + paddle.h);
  ctx.quadraticCurveTo(px, py + paddle.h, px, py + paddle.h - pr);
  ctx.lineTo(px, py + pr);
  ctx.quadraticCurveTo(px, py, px + pr, py);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#e040fb';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ball trail
  if (!attached) {
    ctx.fillStyle = 'rgba(224,64,251,0.15)';
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 1.5, ball.y - ball.vy * 1.5, ball.r * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(224,64,251,0.07)';
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 3, ball.y - ball.vy * 3, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function die() {
  state = 'dead';
  document.getElementById('finalScore').textContent = 'SCORE: ' + score;
  document.getElementById('deathScreen').classList.remove('hidden');
}

function startGame(level) {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  init(level || 1);
  state = 'play';
}

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  drawScene();
  requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'play') launch();
    else if (state === 'start' || state === 'dead') startGame();
    else if (state === 'win') startGame(levelNum + 1);
  }
  if ((state === 'start' || state === 'dead') && ['ArrowLeft','ArrowRight'].includes(e.key)) startGame();
  if (state === 'win' && ['ArrowLeft','ArrowRight'].includes(e.key)) startGame(levelNum + 1);
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mouse / touch paddle control
canvas.addEventListener('mousemove', e => {
  if (state === 'play') {
    const rect = canvas.getBoundingClientRect();
    paddle.x = (e.clientX - rect.left) * (W / rect.width);
    paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));
  }
});
canvas.addEventListener('click', () => {
  if (state === 'play') launch();
  else if (state === 'start' || state === 'dead') startGame();
  else if (state === 'win') startGame(levelNum + 1);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state === 'play') {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    paddle.x = (touch.clientX - rect.left) * (W / rect.width);
    paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));
  }
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  if (state === 'play') launch();
  else if (state === 'start' || state === 'dead') startGame();
  else if (state === 'win') startGame(levelNum + 1);
});

document.getElementById('startScreen').addEventListener('click', () => startGame());
document.getElementById('deathScreen').addEventListener('click', () => startGame());
document.getElementById('winScreen').addEventListener('click', () => startGame(levelNum + 1));

// Init
init();
drawScene();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
