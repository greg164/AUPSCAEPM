<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #33ff33;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      transparent, transparent 2px,
      rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .arcade {
    background: #111;
    border: 3px solid #33ff33;
    border-radius: 12px;
    padding: 20px;
    box-shadow:
      0 0 20px rgba(51, 255, 51, 0.15),
      inset 0 0 40px rgba(0,0,0,0.5);
    position: relative;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 10px;
  }

  .score { text-shadow: 0 0 8px rgba(51,255,51,0.6); }
  .best { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.4); }

  canvas {
    display: block;
    background: #0d0d0d;
    border: 2px solid #1a3a1a;
    image-rendering: pixelated;
  }

  .controls {
    margin-top: 12px;
    text-align: center;
    font-size: 7px;
    color: #1a6a1a;
    letter-spacing: 1px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    border-radius: 12px;
    z-index: 10;
    gap: 20px;
  }

  .overlay.hidden { display: none; }

  .overlay h1 {
    font-size: 22px;
    text-shadow: 0 0 15px rgba(51,255,51,0.8);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .overlay p {
    font-size: 9px;
    color: #1aaa1a;
    animation: blink 1s step-end infinite;
  }

  .overlay .final-score {
    font-size: 12px;
    color: #ffcc00;
    text-shadow: 0 0 10px rgba(255,204,0,0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Mobile d-pad */
  .dpad {
    display: none;
    margin-top: 16px;
    position: relative;
    width: 140px;
    height: 140px;
    margin-left: auto;
    margin-right: auto;
  }

  .dpad button {
    position: absolute;
    width: 44px;
    height: 44px;
    background: #1a1a1a;
    border: 2px solid #33ff33;
    color: #33ff33;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .dpad button:active { background: #33ff33; color: #0a0a0a; }
  .dpad .up    { top: 0; left: 50%; transform: translateX(-50%); }
  .dpad .down  { bottom: 0; left: 50%; transform: translateX(-50%); }
  .dpad .left  { left: 0; top: 50%; transform: translateY(-50%); }
  .dpad .right { right: 0; top: 50%; transform: translateY(-50%); }

  @media (pointer: coarse) {
    .dpad { display: block; }
    .controls { display: none; }
  }
</style>
</head>
<body>

<div class="arcade">
  <div class="header">
    <span class="score" id="score">SCORE: 0</span>
    <span class="best" id="best">BEST: 0</span>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">FLÈCHES / ZQSD POUR JOUER</div>
  <div class="dpad">
    <button class="up" onclick="setDir(0,-1)">▲</button>
    <button class="down" onclick="setDir(0,1)">▼</button>
    <button class="left" onclick="setDir(-1,0)">◄</button>
    <button class="right" onclick="setDir(1,0)">►</button>
  </div>

  <div class="overlay" id="startScreen">
    <h1>🐍 SNAKE</h1>
    <p>APPUYEZ POUR JOUER</p>
  </div>

  <div class="overlay hidden" id="deathScreen">
    <h1>GAME OVER</h1>
    <p class="final-score" id="finalScore"></p>
    <p>APPUYEZ POUR REJOUER</p>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const TILE = 20;
const COLS = canvas.width / TILE;
const ROWS = canvas.height / TILE;

let snake, dir, nextDir, food, score, best = 0, loop, state = 'start';

function init() {
  const mid = Math.floor(COLS / 2);
  snake = [{x: mid, y: Math.floor(ROWS/2)}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  updateScore();
  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateScore() {
  document.getElementById('score').textContent = 'SCORE: ' + score;
  document.getElementById('best').textContent = 'BEST: ' + best;
}

function draw() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#141414';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.fillRect(x*TILE + TILE/2, y*TILE + TILE/2, 1, 1);

  // Food
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff3333';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x*TILE + TILE/2, food.y*TILE + TILE/2, TILE/2 - 2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(180 + 75 * ratio);
    ctx.fillStyle = `rgb(30, ${g}, 30)`;
    ctx.shadowColor = i === 0 ? '#33ff33' : 'transparent';
    ctx.shadowBlur = i === 0 ? 8 : 0;
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(seg.x*TILE + pad, seg.y*TILE + pad, TILE - pad*2, TILE - pad*2);
  });
  ctx.shadowBlur = 0;
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) best = score;
    updateScore();
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function die() {
  clearInterval(loop);
  state = 'dead';
  document.getElementById('finalScore').textContent = 'SCORE: ' + score;
  document.getElementById('deathScreen').classList.remove('hidden');
}

function start() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  init();
  draw();
  state = 'play';
  loop = setInterval(step, 110);
}

function setDir(x, y) {
  if (state === 'start' || state === 'dead') { start(); return; }
  if (x !== 0 && dir.x !== 0) return; // no reverse on same axis
  if (y !== 0 && dir.y !== 0) return;
  nextDir = {x, y};
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
    z:[0,-1], s:[0,1], q:[-1,0], d:[1,0],
    Z:[0,-1], S:[0,1], Q:[-1,0], D:[1,0]
  };
  const m = map[e.key];
  if (m) { e.preventDefault(); setDir(m[0], m[1]); }
});

// Touch / click to start
document.getElementById('startScreen').addEventListener('click', start);
document.getElementById('deathScreen').addEventListener('click', start);

// Initial draw
init();
draw();
</script>
</body>
</html>
