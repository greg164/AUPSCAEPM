<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONKEY KONG - Retro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  .cabinet {
    background: linear-gradient(180deg, #1a1a2e 0%, #0a0a15 100%);
    border: 4px solid #333;
    border-radius: 12px;
    padding: 16px;
    max-width: 100vw;
    box-shadow:
      0 0 30px rgba(255, 50, 50, 0.15),
      inset 0 0 60px rgba(0,0,0,0.5);
  }

  .header {
    text-align: center;
    padding: 8px 0;
    color: #e63946;
    font-size: 14px;
    text-shadow: 2px 2px 0 #000, 0 0 10px #e63946;
    letter-spacing: 4px;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    padding: 6px 4px;
    color: #fff;
    font-size: 9px;
  }

  .hud span { text-shadow: 1px 1px 0 #000; }
  .hud .score-val { color: #f4d35e; }
  .hud .lives-val { color: #e63946; }

  canvas {
    display: block;
    border: 2px solid #444;
    image-rendering: pixelated;
    background: #000;
  }

  .controls-info {
    text-align: center;
    color: #666;
    font-size: 7px;
    padding: 8px 0 2px;
    letter-spacing: 1px;
  }

  /* ── MOBILE CONTROLS ── */
  .mobile-controls {
    display: none;
    padding: 10px 0;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  .mobile-controls .dpad {
    position: relative;
    width: 130px;
    height: 130px;
  }

  .mobile-controls button {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    width: 42px; height: 42px;
    background: #1a1a2e;
    color: #aaa;
    border: 2px solid #444;
    border-radius: 8px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
    position: absolute;
  }
  .mobile-controls button:active { background: #e63946; color: #fff; border-color: #e63946; }

  .mobile-controls .btn-up    { top: 0; left: 50%; transform: translateX(-50%); }
  .mobile-controls .btn-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
  .mobile-controls .btn-left  { left: 0; top: 50%; transform: translateY(-50%); }
  .mobile-controls .btn-right { right: 0; top: 50%; transform: translateY(-50%); }

  .mobile-controls .btn-jump {
    position: relative;
    width: 64px; height: 64px;
    border-radius: 50%;
    font-size: 10px;
    background: #1a1a2e;
    color: #f4d35e;
    border: 2px solid #f4d35e;
  }
  .mobile-controls .btn-jump:active { background: #f4d35e; color: #1a1a2e; }

  @media (pointer: coarse) {
    .mobile-controls { display: flex; }
    .controls-info { display: none; }
  }

  @media (max-width: 480px) {
    .cabinet { padding: 8px; border-width: 3px; }
    canvas { width: calc(100vw - 30px); height: auto; }
    .header { font-size: 11px; padding: 4px 0; }
    .hud { font-size: 8px; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="header">DONKEY KONG</div>
  <div class="hud">
    <span>SCORE <span class="score-val" id="score">0000</span></span>
    <span>HI <span class="score-val" id="hi">0000</span></span>
    <span>LIVES <span class="lives-val" id="lives">♥♥♥</span></span>
  </div>
  <canvas id="game" width="448" height="512"></canvas>
  <div class="controls-info">← → MOVE &nbsp; ↑↓ CLIMB &nbsp; SPACE JUMP</div>
  <div class="mobile-controls">
    <div class="dpad">
      <button class="btn-up" id="btnU">▲</button>
      <button class="btn-down" id="btnD">▼</button>
      <button class="btn-left" id="btnL">◀</button>
      <button class="btn-right" id="btnR">▶</button>
    </div>
    <button class="btn-jump" id="btnJ">JUMP</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ── COULEURS RÉTRO ──
const C = {
  bg: '#000000',
  girder: '#e63946',
  girderHi: '#ff6b6b',
  ladder: '#457b9d',
  player: '#2196F3',
  playerHat: '#e63946',
  barrel: '#8B4513',
  barrelBand: '#D2691E',
  dk: '#8B4513',
  dkFace: '#DEB887',
  princess: '#ff69b4',
  princessHair: '#ffd700',
  text: '#ffffff',
  flame: '#ff6600',
};

// ── ÉTAT DU JEU ──
let state = 'title'; // title, playing, dead, gameover, win
let score = 0;
let hiScore = 0;
let lives = 3;
let deathTimer = 0;
let winTimer = 0;

// ── NIVEAUX (plateformes) ──
const platforms = [];
const ladders = [];
const barrels = [];
let barrelTimer = 0;
const BARREL_INTERVAL = 75;

function buildLevel() {
  platforms.length = 0;
  ladders.length = 0;
  barrels.length = 0;
  barrelTimer = 0;

  const pH = 14;
  const levels = [
    { y: 488, x: 0, w: W, slope: 0 },
    { y: 408, x: 10, w: 428, slope: -0.03 },
    { y: 328, x: 20, w: 408, slope: 0.03 },
    { y: 248, x: 40, w: 368, slope: -0.03 },
    { y: 168, x: 60, w: 328, slope: 0.03 },
    { y: 100, x: 120, w: 200, slope: 0 },
  ];

  levels.forEach(l => {
    platforms.push({ x: l.x, y: l.y, w: l.w, h: pH, slope: l.slope });
  });

  const ladderDefs = [
    { x: 390, y1: 488, y2: 408 },
    { x: 60,  y1: 408, y2: 328 },
    { x: 340, y1: 328, y2: 248 },
    { x: 80,  y1: 248, y2: 168 },
    { x: 220, y1: 168, y2: 100 },
  ];

  ladderDefs.forEach(l => {
    ladders.push({ x: l.x, y: l.y2, w: 18, h: l.y1 - l.y2 });
  });
}

// ── JOUEUR ──
const player = {
  x: 40, y: 0, vx: 0, vy: 0,
  w: 20, h: 28,
  onGround: false,
  climbing: false,
  facing: 1,
  frame: 0,
};

function resetPlayer() {
  player.x = 40;
  player.y = 488 - player.h;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.climbing = false;
  player.frame = 0;
}

// ── DK Position ──
const dk = { x: 60, y: 100 - 56, w: 48, h: 48, frame: 0 };

// ── Princesse ──
const princess = { x: 200, y: 100 - 30, w: 20, h: 28 };

// ── ENTRÉES ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'title' || state === 'gameover') {
    startGame();
    e.preventDefault();
  }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile
function setupMobile() {
  const btnL = document.getElementById('btnL');
  const btnR = document.getElementById('btnR');
  const btnU = document.getElementById('btnU');
  const btnD = document.getElementById('btnD');
  const btnJ = document.getElementById('btnJ');

  const press = (code) => { keys[code] = true; if (state === 'title' || state === 'gameover') startGame(); };
  const release = (code) => { keys[code] = false; };

  btnL.addEventListener('touchstart', e => { e.preventDefault(); press('ArrowLeft'); });
  btnL.addEventListener('touchend', e => { e.preventDefault(); release('ArrowLeft'); });
  btnR.addEventListener('touchstart', e => { e.preventDefault(); press('ArrowRight'); });
  btnR.addEventListener('touchend', e => { e.preventDefault(); release('ArrowRight'); });
  btnU.addEventListener('touchstart', e => { e.preventDefault(); press('ArrowUp'); });
  btnU.addEventListener('touchend', e => { e.preventDefault(); release('ArrowUp'); });
  btnD.addEventListener('touchstart', e => { e.preventDefault(); press('ArrowDown'); });
  btnD.addEventListener('touchend', e => { e.preventDefault(); release('ArrowDown'); });
  btnJ.addEventListener('touchstart', e => { e.preventDefault(); press('Space'); });
  btnJ.addEventListener('touchend', e => { e.preventDefault(); release('Space'); });
}
setupMobile();

// ── FONCTIONS PLATEFORME ──
function getPlatformYAt(plat, px) {
  return plat.y + (px - plat.x) * plat.slope;
}

function isOnPlatform(entity) {
  for (const p of platforms) {
    const ey = entity.y + entity.h;
    const py = getPlatformYAt(p, entity.x + entity.w / 2);
    if (entity.x + entity.w > p.x && entity.x < p.x + p.w) {
      if (ey >= py && ey <= py + p.h + 4 && entity.vy >= 0) {
        return { plat: p, surfaceY: py };
      }
    }
  }
  return null;
}

function isOnLadder(entity) {
  const cx = entity.x + entity.w / 2;
  const cy = entity.y + entity.h;
  for (const l of ladders) {
    if (cx > l.x && cx < l.x + l.w && cy > l.y && cy < l.y + l.h + 10) {
      return l;
    }
  }
  return null;
}

// ── BARILS ──
function spawnBarrel() {
  barrels.push({
    x: dk.x + dk.w,
    y: dk.y + dk.h - 20,
    w: 16, h: 16,
    vx: 3.5,
    vy: 0,
    onGround: false,
    roll: 0,
  });
}

function updateBarrels() {
  barrelTimer++;
  if (barrelTimer >= BARREL_INTERVAL) {
    barrelTimer = 0;
    spawnBarrel();
    dk.frame = 10;
  }
  if (dk.frame > 0) dk.frame--;

  for (let i = barrels.length - 1; i >= 0; i--) {
    const b = barrels[i];
    b.vy += 0.4;
    b.x += b.vx;
    b.y += b.vy;
    b.roll += b.vx * 0.1;

    const onP = isOnPlatform(b);
    if (onP) {
      b.y = onP.surfaceY - b.h;
      b.vy = 0;
      b.onGround = true;
      b.currentPlat = onP.plat;
      b.vx = onP.plat.slope < 0 ? 3.5 : onP.plat.slope > 0 ? -3.5 : b.vx;
    } else {
      if (b.onGround) {
        b.vx = 0;
      }
      b.onGround = false;
      b.currentPlat = null;
    }

    const onL = isOnLadder(b);
    if (onL && b.onGround && Math.random() < 0.012) {
      b.vy = 2;
      b.vx = 0;
      b.currentPlat = null;
    }

    if (b.y > H + 20) {
      barrels.splice(i, 1);
      continue;
    }

    if (state === 'playing') {
      if (rectsOverlap(player, b)) {
        playerDie();
      }
      if (!b.scored && player.y + player.h < b.y && Math.abs(player.x - b.x) < 30 && !player.onGround) {
        b.scored = true;
        score += 100;
      }
    }
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── JOUEUR UPDATE ──
function updatePlayer() {
  if (state !== 'playing') return;

  const spd = 2.5;
  const jumpForce = -5.2;
  const gravity = 0.38;

  const ladder = isOnLadder(player);

  if (player.climbing) {
    player.vx = 0;
    player.vy = 0;
    if (keys['ArrowUp']) { player.vy = -2; player.frame += 0.1; }
    if (keys['ArrowDown']) { player.vy = 2; player.frame += 0.1; }
    if (keys['ArrowLeft']) { player.climbing = false; }
    if (keys['ArrowRight']) { player.climbing = false; }

    player.y += player.vy;

    if (!isOnLadder(player)) {
      player.climbing = false;
      player.vy = 0;
    }

    const onP = isOnPlatform(player);
    if (onP && player.vy < 0) {
      player.y = onP.surfaceY - player.h;
      player.climbing = false;
      player.vy = 0;
    }
  } else {
    if (keys['ArrowLeft']) { player.vx = -spd; player.facing = -1; player.frame += 0.15; }
    else if (keys['ArrowRight']) { player.vx = spd; player.facing = 1; player.frame += 0.15; }
    else { player.vx = 0; }

    if (keys['ArrowUp'] && ladder) {
      player.climbing = true;
      player.x = ladder.x + ladder.w / 2 - player.w / 2;
      player.vy = 0;
    }

    if (keys['Space'] && player.onGround) {
      player.vy = jumpForce;
      player.onGround = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    const onP = isOnPlatform(player);
    if (onP) {
      player.y = onP.surfaceY - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > W) player.x = W - player.w;
  }

  if (player.y > H + 50) {
    playerDie();
  }

  if (rectsOverlap(player, princess)) {
    state = 'win';
    winTimer = 180;
    score += 1000;
  }
}

function playerDie() {
  lives--;
  state = 'dead';
  deathTimer = 90;
}

// ── DÉMARRAGE ──
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  buildLevel();
  resetPlayer();
}

// ── DESSIN ──
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawPlatforms() {
  for (const p of platforms) {
    for (let px = 0; px < p.w; px += 2) {
      const py = getPlatformYAt(p, p.x + px);
      drawPixelRect(p.x + px, py, 2, p.h, C.girder);
      if (px % 16 === 0) {
        drawPixelRect(p.x + px + 2, py + 2, 4, 4, C.girderHi);
      }
    }
  }
}

function drawLadders() {
  for (const l of ladders) {
    drawPixelRect(l.x, l.y, 3, l.h, C.ladder);
    drawPixelRect(l.x + l.w - 3, l.y, 3, l.h, C.ladder);
    for (let ry = 0; ry < l.h; ry += 14) {
      drawPixelRect(l.x, l.y + ry, l.w, 2, C.ladder);
    }
  }
}

function drawPlayer() {
  const p = player;
  const f = Math.floor(p.frame) % 2;

  if (state === 'dead') {
    if (Math.floor(deathTimer / 5) % 2 === 0) return;
  }

  drawPixelRect(p.x + 4, p.y + 10, 12, 12, C.player);
  drawPixelRect(p.x + 5, p.y + 2, 10, 10, '#ffcc99');
  drawPixelRect(p.x + 3, p.y, 14, 5, C.playerHat);
  drawPixelRect(p.x + (p.facing === 1 ? 11 : 7), p.y + 5, 2, 2, '#000');
  if (p.climbing) {
    const lf = Math.floor(p.frame) % 2;
    drawPixelRect(p.x + 4, p.y + 22, 5, 6, C.player);
    drawPixelRect(p.x + 11, p.y + 22 - lf * 4, 5, 6, C.player);
  } else if (!p.onGround) {
    drawPixelRect(p.x + 2, p.y + 22, 6, 6, C.player);
    drawPixelRect(p.x + 12, p.y + 22, 6, 6, C.player);
  } else {
    drawPixelRect(p.x + 4 - f * 3, p.y + 22, 5, 6, C.player);
    drawPixelRect(p.x + 11 + f * 3, p.y + 22, 5, 6, C.player);
  }
}

function drawDK() {
  const d = dk;
  const throwing = d.frame > 0;

  drawPixelRect(d.x + 4, d.y + 16, 40, 28, C.dk);
  drawPixelRect(d.x + 10, d.y, 28, 20, C.dk);
  drawPixelRect(d.x + 16, d.y + 4, 16, 12, C.dkFace);
  drawPixelRect(d.x + 18, d.y + 6, 4, 4, '#000');
  drawPixelRect(d.x + 26, d.y + 6, 4, 4, '#000');
  drawPixelRect(d.x + 20, d.y + 12, 8, 3, '#8B0000');
  if (throwing) {
    drawPixelRect(d.x + 40, d.y + 10, 10, 8, C.dk);
  } else {
    drawPixelRect(d.x - 4, d.y + 18, 8, 12, C.dk);
    drawPixelRect(d.x + 44, d.y + 18, 8, 12, C.dk);
  }
  drawPixelRect(d.x + 6, d.y + 44, 14, 6, C.dk);
  drawPixelRect(d.x + 28, d.y + 44, 14, 6, C.dk);
}

function drawPrincess() {
  const p = princess;
  const bob = Math.sin(Date.now() * 0.004) * 2;
  drawPixelRect(p.x + 2, p.y + 10 + bob, 16, 18, C.princess);
  drawPixelRect(p.x + 4, p.y + 2 + bob, 12, 10, '#ffcc99');
  drawPixelRect(p.x + 2, p.y + bob, 16, 5, C.princessHair);
  drawPixelRect(p.x + 7, p.y + 5 + bob, 2, 2, '#000');
  drawPixelRect(p.x + 12, p.y + 5 + bob, 2, 2, '#000');
  ctx.fillStyle = '#fff';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('HELP!', p.x - 6, p.y - 6 + bob);
}

function drawBarrels() {
  for (const b of barrels) {
    ctx.save();
    ctx.translate(b.x + b.w / 2, b.y + b.h / 2);
    ctx.rotate(b.roll);
    drawPixelRect(-b.w / 2, -b.h / 2, b.w, b.h, C.barrel);
    drawPixelRect(-b.w / 2, -b.h / 2 + 3, b.w, 3, C.barrelBand);
    drawPixelRect(-b.w / 2, b.h / 2 - 6, b.w, 3, C.barrelBand);
    ctx.restore();
  }
}

function drawHUD() {
  document.getElementById('score').textContent = String(score).padStart(4, '0');
  document.getElementById('hi').textContent = String(hiScore).padStart(4, '0');
  document.getElementById('lives').textContent = '♥'.repeat(Math.max(0, lives));
}

function drawTitle() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = C.girder;
  ctx.font = '28px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('DONKEY', W / 2, 180);
  ctx.fillText('KONG', W / 2, 220);

  ctx.fillStyle = '#f4d35e';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText('PRESS ANY KEY', W / 2, 320);

  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) {
    ctx.fillStyle = '#fff';
    ctx.fillText('TO START', W / 2, 345);
  }

  ctx.fillStyle = '#666';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('← → MOVE   SPACE JUMP', W / 2, 420);
  ctx.fillText('↑ ↓ CLIMB LADDERS', W / 2, 440);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = C.girder;
  ctx.font = '22px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, 240);

  ctx.fillStyle = '#f4d35e';
  ctx.font = '12px "Press Start 2P"';
  ctx.fillText('SCORE: ' + score, W / 2, 280);

  ctx.fillStyle = '#fff';
  ctx.font = '9px "Press Start 2P"';
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) ctx.fillText('PRESS ANY KEY', W / 2, 340);
  ctx.textAlign = 'left';
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#f4d35e';
  ctx.font = '22px "Press Start 2P"';
  ctx.fillText('BONUS B', W / 2, 200);

  ctx.fillStyle = '#fff';
  ctx.font = '13px "Press Start 2P"';
  ctx.fillText('Je suis', W / 2, 270);
  ctx.fillText('ton père', W / 2, 295);

  ctx.fillStyle = '#666';
  ctx.font = '9px "Press Start 2P"';
  ctx.fillText('(Star Wars)', W / 2, 330);

  ctx.fillStyle = C.princess;
  ctx.font = '20px "Press Start 2P"';
  const hBlink = Math.floor(Date.now() / 300) % 2;
  if (hBlink) ctx.fillText('♥ ♥ ♥', W / 2, 380);

  ctx.textAlign = 'left';
}

// ── BOUCLE PRINCIPALE ──
function update() {
  if (state === 'playing') {
    updatePlayer();
    updateBarrels();
  } else if (state === 'dead') {
    deathTimer--;
    if (deathTimer <= 0) {
      if (lives <= 0) {
        state = 'gameover';
        if (score > hiScore) hiScore = score;
      } else {
        state = 'playing';
        resetPlayer();
        barrels.length = 0;
        barrelTimer = 0;
      }
    }
  } else if (state === 'win') {
    winTimer--;
    if (winTimer <= 0) {
      if (score > hiScore) hiScore = score;
      state = 'title';
    }
  }
}

function draw() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') {
    drawPlatforms();
    drawLadders();
    drawDK();
    drawPrincess();
    drawTitle();
  } else if (state === 'gameover') {
    drawPlatforms();
    drawLadders();
    drawGameOver();
  } else {
    drawPlatforms();
    drawLadders();
    drawBarrels();
    drawDK();
    drawPrincess();
    drawPlayer();

    if (state === 'win') drawWin();
  }

  drawHUD();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
buildLevel();
resetPlayer();
loop();
</script>
</body>
</html>
