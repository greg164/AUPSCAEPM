<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Ninja</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #0a0a12;
    font-family: 'Fredoka', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  canvas {
    display: block;
    cursor: none;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #score-display {
    position: absolute;
    top: 24px; left: 32px;
    font-family: 'Bungee Shade', cursive;
    font-size: 42px;
    color: #ffe066;
    text-shadow: 0 0 20px rgba(255,224,102,0.4), 2px 2px 0 #c0392b;
    letter-spacing: 2px;
  }

  #combo-display {
    position: absolute;
    top: 76px; left: 36px;
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #ff6b6b;
    text-shadow: 0 0 12px rgba(255,107,107,0.5);
    opacity: 0;
    transition: opacity 0.2s;
  }

  #lives-display {
    position: absolute;
    top: 24px; right: 32px;
    font-size: 36px;
    filter: drop-shadow(0 0 8px rgba(255,0,0,0.4));
  }

  #best-display {
    position: absolute;
    top: 80px; right: 32px;
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
  }

  #start-screen, #game-over-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: all;
  }

  #start-screen {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
  }

  #game-over-screen {
    background: rgba(10,10,18,0.92);
    backdrop-filter: blur(8px);
    display: none;
  }

  .title {
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(40px, 8vw, 80px);
    background: linear-gradient(135deg, #ff6b6b, #ffe066, #51cf66);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    text-align: center;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .subtitle {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 48px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 24px;
    padding: 16px 56px;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff;
    box-shadow: 0 8px 32px rgba(238,90,36,0.4), inset 0 -3px 0 rgba(0,0,0,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
    pointer-events: all;
  }

  .btn:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 12px 40px rgba(238,90,36,0.5), inset 0 -3px 0 rgba(0,0,0,0.2);
  }

  .btn:active { transform: translateY(1px) scale(0.98); }

  .go-final-score {
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(48px, 10vw, 96px);
    color: #ffe066;
    text-shadow: 0 0 30px rgba(255,224,102,0.4);
    margin-bottom: 8px;
  }

  .go-label {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .go-best {
    font-size: 16px;
    color: rgba(255,255,255,0.35);
    margin-top: 20px;
  }

  .fruit-deco {
    font-size: 48px;
    margin-bottom: 24px;
    animation: bounce 1.5s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui-overlay">
  <div id="score-display">0</div>
  <div id="combo-display"></div>
  <div id="lives-display"></div>
  <div id="best-display"></div>
</div>

<div id="start-screen">
  <div class="fruit-deco">🍉🔪🍊</div>
  <div class="title">Fruit Slash</div>
  <div class="subtitle">Tranche les fruits !</div>
  <button class="btn" id="start-btn">JOUER</button>
</div>

<div id="game-over-screen">
  <div class="fruit-deco">💀</div>
  <div class="go-label">Game Over</div>
  <div class="go-final-score" id="go-score">0</div>
  <div class="go-label">points</div>
  <button class="btn" id="retry-btn">REJOUER</button>
  <div class="go-best" id="go-best"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- State ---
let W, H;
let fruits = [];
let sliceTrail = [];
let particles = [];
let splashes = [];
let score = 0;
let combo = 0;
let comboTimer = 0;
let lives = 3;
let bestScore = 0;
let gameRunning = false;
let spawnTimer = 0;
let difficulty = 0;
let mouseX = -100, mouseY = -100;
let lastMX = -100, lastMY = -100;
let mouseDown = false;
let frameCount = 0;

const FRUIT_TYPES = [
  { emoji: '🍉', size: 450, points: 1, color: '#2ecc71' },
  { emoji: '🍊', size: 400, points: 1, color: '#f39c12' },
  { emoji: '🍎', size: 390, points: 1, color: '#e74c3c' },
  { emoji: '🍋', size: 370, points: 1, color: '#f1c40f' },
  { emoji: '🍇', size: 390, points: 2, color: '#8e44ad' },
  { emoji: '🍑', size: 390, points: 1, color: '#fd79a8' },
  { emoji: '🥝', size: 360, points: 2, color: '#00b894' },
  { emoji: '🍍', size: 440, points: 3, color: '#fdcb6e' },
];

const BOMB = { emoji: '💣', size: 410, color: '#2d3436' };

// --- Resize ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Input ---
function updateMouse(x, y) {
  lastMX = mouseX; lastMY = mouseY;
  mouseX = x; mouseY = y;
  if (mouseDown && gameRunning) {
    sliceTrail.push({ x, y, life: 1 });
  }
}

canvas.addEventListener('mousedown', e => { mouseDown = true; updateMouse(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); mouseDown = true; const t = e.touches[0]; updateMouse(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; updateMouse(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); mouseDown = false; }, { passive: false });

// --- Spawn ---
function spawnFruit() {
  const isBomb = Math.random() < Math.min(0.12 + difficulty * 0.01, 0.25);
  const type = isBomb ? BOMB : FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
  const side = Math.random();
  let x, vx;
  if (side < 0.3) { x = W * 0.1 + Math.random() * W * 0.2; vx = 1 + Math.random() * 2; }
  else if (side > 0.7) { x = W * 0.7 + Math.random() * W * 0.2; vx = -1 - Math.random() * 2; }
  else { x = W * 0.3 + Math.random() * W * 0.4; vx = (Math.random() - 0.5) * 3; }

  const speed = 22 + Math.random() * 8 + difficulty * 0.5;
  fruits.push({
    x, y: H + 60,
    vx, vy: -speed,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.15,
    type,
    isBomb,
    size: type.size,
    sliced: false,
    missed: false,
  });
}

// --- Particles ---
function emitParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: 3 + Math.random() * 6,
      color,
    });
  }
}

function emitSplash(x, y, color) {
  splashes.push({ x, y, radius: 0, maxRadius: 40 + Math.random() * 30, life: 1, color });
}

// --- Collision ---
function checkSlice(fruit) {
  if (fruit.sliced || !mouseDown) return false;
  const dx = mouseX - fruit.x;
  const dy = mouseY - fruit.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < fruit.size * 0.35;
}

// --- UI ---
const scoreEl = document.getElementById('score-display');
const comboEl = document.getElementById('combo-display');
const livesEl = document.getElementById('lives-display');
const bestEl = document.getElementById('best-display');

function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
  bestEl.textContent = bestScore > 0 ? `Best: ${bestScore}` : '';
  if (comboTimer > 0 && combo >= 2) {
    comboEl.style.opacity = '1';
    comboEl.textContent = `🔥 x${combo} COMBO!`;
  } else {
    comboEl.style.opacity = '0';
  }
}

// --- Game loop ---
function update() {
  frameCount++;
  difficulty = Math.floor(score / 10);

  // Spawn
  const spawnRate = Math.max(25, 55 - difficulty * 3);
  spawnTimer++;
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    const count = Math.random() < 0.2 + difficulty * 0.03 ? 2 : 1;
    for (let i = 0; i < count; i++) setTimeout(() => spawnFruit(), i * 150);
  }

  // Combo timer
  if (comboTimer > 0) comboTimer--;
  else combo = 0;

  // Fruits
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.vy += 0.35; // gravity
    f.x += f.vx;
    f.y += f.vy;
    f.rotation += f.rotSpeed;

    if (!f.sliced && checkSlice(f)) {
      f.sliced = true;
      if (f.isBomb) {
        // Bomb hit!
        lives = 0;
        emitParticles(f.x, f.y, '#2d3436', 30);
        emitParticles(f.x, f.y, '#e17055', 20);
        emitSplash(f.x, f.y, 'rgba(45,52,54,0.5)');
      } else {
        combo++;
        comboTimer = 45;
        const pts = f.type.points * (combo >= 3 ? 2 : 1);
        score += pts;
        emitParticles(f.x, f.y, f.type.color, 15);
        emitSplash(f.x, f.y, f.type.color + '55');

        // Score popup
        particles.push({
          x: f.x, y: f.y - 20,
          vx: 0, vy: -2,
          life: 1, decay: 0.02,
          size: 0, color: '#fff',
          text: combo >= 3 ? `+${pts} 🔥` : `+${pts}`,
        });
      }
    }

    // Missed fruit (fell off screen)
    if (!f.sliced && !f.isBomb && f.y > H + 80 && f.vy > 0) {
      if (!f.missed) {
        f.missed = true;
        lives--;
      }
    }

    // Remove off-screen
    if (f.y > H + 120 || f.x < -100 || f.x > W + 100) {
      fruits.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Splashes
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    s.radius += 3;
    s.life -= 0.03;
    if (s.life <= 0) splashes.splice(i, 1);
  }

  // Slice trail decay
  for (let i = sliceTrail.length - 1; i >= 0; i--) {
    sliceTrail[i].life -= 0.06;
    if (sliceTrail[i].life <= 0) sliceTrail.splice(i, 1);
  }

  updateUI();

  if (lives <= 0 && gameRunning) endGame();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a12');
  bg.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Splashes
  for (const s of splashes) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.life * 0.5;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Slice trail
  if (sliceTrail.length > 1) {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 1; i < sliceTrail.length; i++) {
      const a = sliceTrail[i - 1];
      const b = sliceTrail[i];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(255,255,255,${b.life * 0.8})`;
      ctx.lineWidth = b.life * 6;
      ctx.stroke();
    }
    // Glow
    for (let i = 1; i < sliceTrail.length; i++) {
      const a = sliceTrail[i - 1];
      const b = sliceTrail[i];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(255,224,102,${b.life * 0.3})`;
      ctx.lineWidth = b.life * 16;
      ctx.stroke();
    }
  }

  // Fruits
  for (const f of fruits) {
    if (f.sliced) continue;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation);
    ctx.font = `${f.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Shadow glow
    ctx.shadowColor = f.isBomb ? 'rgba(255,0,0,0.5)' : 'rgba(255,255,255,0.2)';
    ctx.shadowBlur = f.isBomb ? 20 : 10;
    ctx.fillText(f.type.emoji, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    if (p.text) {
      ctx.font = '700 22px Fredoka, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = p.color;
      ctx.shadowColor = 'rgba(255,224,102,0.6)';
      ctx.shadowBlur = 10;
      ctx.fillText(p.text, p.x, p.y);
      ctx.shadowBlur = 0;
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Custom cursor
  if (mouseDown) {
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,224,102,0.9)';
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;
  } else {
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }
}

function gameLoop() {
  if (!gameRunning) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Start / End ---
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  fruits = []; sliceTrail = []; particles = []; splashes = [];
  score = 0; combo = 0; comboTimer = 0; lives = 3;
  spawnTimer = 0; difficulty = 0; frameCount = 0;
  gameRunning = true;
  updateUI();
  gameLoop();
}

function endGame() {
  gameRunning = false;
  if (score > bestScore) bestScore = score;
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best').textContent = bestScore > 0 ? `Meilleur score : ${bestScore}` : '';
  document.getElementById('game-over-screen').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
</script>
</body>
</html>
